

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Calculator</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #f4f6f8;
      color: #333;
    }

    .wrapper {
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 20px;
      margin: 0 0 12px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.98);
    }

    .results {
      margin-top: 18px;
    }

    .section {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      background: #f9fafb;
    }

    .section h2 {
      font-size: 15px;
      margin: 0 0 6px;
    }

    .row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      font-size: 14px;
    }

    .down {
      font-weight: 600;
      margin-bottom: 4px;
    }

    @media (max-width: 400px) {
      h1 { font-size: 18px; }
      input, button { font-size: 15px; }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <div class="card">
    <h1>Payment Calculator</h1>

    <input type="number" id="balance" placeholder="Enter balance" />
    <button onclick="calculate()">Calculate</button>

    <div id="results" class="results"></div>
  </div>
</div>

<script>
function format(num) {
  return Number(num).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function calculate() {
  const val = document.getElementById("balance").value;
  const amount = parseFloat(val);
  const results = document.getElementById("results");

  if (isNaN(amount) || amount <= 0) {
    results.innerHTML = "";
    return;
  }

  const months = [3, 6, 12];

  const standard = months.map(m => ({
    m,
    pay: amount / m
  }));

  const down = amount * 0.25;
  const remaining = amount - down;

  const withDown = months.map(m => ({
    m,
    pay: remaining / m
  }));

  results.innerHTML = `
    <div class="section">
      <h2>Standard</h2>
      ${standard.map(p => `
        <div class="row">
          <span>${p.m} months</span>
          <span>${format(p.pay)}</span>
        </div>
      `).join("")}
    </div>

    <div class="section">
      <h2>25% Down</h2>
      <div class="down">Down: ${format(down)}</div>
      ${withDown.map(p => `
        <div class="row">
          <span>${p.m} months</span>
          <span>${format(p.pay)}</span>
        </div>
      `).join("")}
    </div>


    <div class="section">
      <h2>Settlement Options</h2>
      ${[10,15,20,25,30,35,40,45,50].map(pct => {
        const settled = amount * (1 - pct / 100);
        return `
          <div class="row">
            <span>${pct}% off</span>
            <span>${format(settled)}</span>
          </div>
        `;
      }).join("")}
    </div>
  `;
}
</script>

</body>
</html>
