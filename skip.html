<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkipTrace</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Georgia', serif;
    background: #0d0d0d;
    color: #e8e0d0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 3rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: normal;
    letter-spacing: 0.25em;
    color: #c8b88a;
    text-transform: uppercase;
  }

  header p {
    font-size: 0.8rem;
    color: #666;
    margin-top: 0.4rem;
    letter-spacing: 0.1em;
    font-family: monospace;
  }

  .search-box {
    width: 100%;
    max-width: 640px;
    background: #161616;
    border: 1px solid #2a2a2a;
    border-radius: 4px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .fields {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  @media (max-width: 500px) {
    .fields { grid-template-columns: 1fr; }
  }

  label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 0.3rem;
    font-family: monospace;
  }

  input, select {
    width: 100%;
    background: #0d0d0d;
    border: 1px solid #2a2a2a;
    border-radius: 2px;
    color: #e8e0d0;
    padding: 0.55rem 0.75rem;
    font-size: 0.95rem;
    font-family: 'Georgia', serif;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus {
    border-color: #c8b88a;
  }

  select option { background: #161616; }

  button#searchBtn {
    width: 100%;
    background: #c8b88a;
    color: #0d0d0d;
    border: none;
    border-radius: 2px;
    padding: 0.7rem;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-family: monospace;
    cursor: pointer;
    transition: background 0.15s;
  }

  button#searchBtn:hover { background: #d4c9a0; }
  button#searchBtn:disabled { background: #444; color: #666; cursor: not-allowed; }

  .status {
    font-size: 0.8rem;
    font-family: monospace;
    color: #888;
    text-align: center;
    margin-bottom: 1.5rem;
    min-height: 1.2em;
  }

  .status.error { color: #c0614a; }

  .results {
    width: 100%;
    max-width: 640px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .result-card {
    background: #161616;
    border: 1px solid #2a2a2a;
    border-left: 3px solid #c8b88a;
    border-radius: 4px;
    padding: 1.25rem 1.5rem;
  }

  .result-card h2 {
    font-size: 1.1rem;
    font-weight: normal;
    color: #e8e0d0;
    margin-bottom: 0.75rem;
    letter-spacing: 0.05em;
  }

  .result-section {
    margin-bottom: 0.75rem;
  }

  .result-section:last-child { margin-bottom: 0; }

  .result-section .section-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #c8b88a;
    font-family: monospace;
    margin-bottom: 0.3rem;
  }

  .result-section .items {
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .result-section .item {
    font-size: 0.9rem;
    color: #ccc;
    font-family: monospace;
  }

  .no-results {
    text-align: center;
    color: #555;
    font-family: monospace;
    font-size: 0.85rem;
    padding: 2rem 0;
  }

  .disclaimer {
    margin-top: 3rem;
    max-width: 640px;
    font-size: 0.7rem;
    font-family: monospace;
    color: #444;
    text-align: center;
    line-height: 1.6;
  }
</style>
</head>
<body>

<header>
  <h1>SkipTrace</h1>
  <p>public records · personal use only</p>
</header>

<div class="search-box">
  <div class="fields">
    <div>
      <label for="fname">First Name</label>
      <input id="fname" type="text" placeholder="John" autocomplete="off" />
    </div>
    <div>
      <label for="lname">Last Name</label>
      <input id="lname" type="text" placeholder="Smith" autocomplete="off" />
    </div>
    <div>
      <label for="state">State</label>
      <select id="state">
        <option value="">Any</option>
        <option>AL</option><option>AK</option><option>AZ</option><option>AR</option>
        <option>CA</option><option>CO</option><option>CT</option><option>DE</option>
        <option>FL</option><option>GA</option><option>HI</option><option>ID</option>
        <option>IL</option><option>IN</option><option>IA</option><option>KS</option>
        <option>KY</option><option>LA</option><option>ME</option><option>MD</option>
        <option>MA</option><option>MI</option><option>MN</option><option>MS</option>
        <option>MO</option><option>MT</option><option>NE</option><option>NV</option>
        <option>NH</option><option>NJ</option><option>NM</option><option>NY</option>
        <option>NC</option><option>ND</option><option>OH</option><option>OK</option>
        <option>OR</option><option>PA</option><option>RI</option><option>SC</option>
        <option>SD</option><option>TN</option><option>TX</option><option>UT</option>
        <option>VT</option><option>VA</option><option>WA</option><option>WV</option>
        <option>WI</option><option>WY</option>
      </select>
    </div>
  </div>
  <button id="searchBtn" onclick="doSearch()">Search</button>
</div>

<div class="status" id="status"></div>
<div class="results" id="results"></div>

<div class="disclaimer">
  Data sourced from TruePeopleSearch public records. Results may be incomplete or outdated.
  For personal investigative use only. Not a consumer reporting agency (FCRA does not apply).
  Do not use for credit, employment, or housing decisions.
</div>

<script>
const WORKER_URL = 'https://buddy.rtravisflower.workers.dev';

function parseResults(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const cards = doc.querySelectorAll('.card.card-block');
  const people = [];

  cards.forEach(card => {
    const person = {};

    const nameEl = card.querySelector('.h4') || card.querySelector('h4') || card.querySelector('.name');
    if (nameEl) person.name = nameEl.textContent.trim();

    const ageEl = card.querySelector('.content-value');
    if (ageEl) person.age = ageEl.textContent.trim();

    const phones = [];
    card.querySelectorAll('a[href^="tel:"]').forEach(a => {
      const num = a.textContent.trim();
      if (num && !phones.includes(num)) phones.push(num);
    });
    const phoneLabels = card.querySelectorAll('.phone-label, .content-label');
    if (phones.length === 0) {
      card.querySelectorAll('li').forEach(li => {
        const txt = li.textContent.trim();
        if (/\(?\d{3}\)?[\s\-]\d{3}[\s\-]\d{4}/.test(txt)) {
          const m = txt.match(/\(?\d{3}\)?[\s\-]\d{3}[\s\-]\d{4}/);
          if (m && !phones.includes(m[0])) phones.push(m[0]);
        }
      });
    }
    person.phones = phones;

    const addresses = [];
    card.querySelectorAll('.address, [itemprop="address"]').forEach(el => {
      const addr = el.textContent.replace(/\s+/g, ' ').trim();
      if (addr && !addresses.includes(addr)) addresses.push(addr);
    });
    if (addresses.length === 0) {
      card.querySelectorAll('li').forEach(li => {
        const txt = li.textContent.trim();
        if (/\d{5}/.test(txt) && txt.length > 8 && txt.length < 120) {
          addresses.push(txt.replace(/\s+/g, ' '));
        }
      });
    }
    person.addresses = addresses.slice(0, 3);

    const relatives = [];
    card.querySelectorAll('.relative, .relatives a, .possible-relative').forEach(el => {
      const name = el.textContent.trim();
      if (name && !relatives.includes(name)) relatives.push(name);
    });
    person.relatives = relatives.slice(0, 4);

    if (person.name || person.phones.length > 0) people.push(person);
  });

  if (people.length === 0) {
    const altCards = doc.querySelectorAll('.search-results .result, .person-card, [class*="result"]');
    altCards.forEach(card => {
      const person = { name: '', phones: [], addresses: [], relatives: [] };
      const txt = card.textContent;
      const phones = txt.match(/\(?\d{3}\)?[\s\-\.]\d{3}[\s\-\.]\d{4}/g) || [];
      person.phones = [...new Set(phones)].slice(0, 5);
      const nameEl = card.querySelector('h2, h3, h4, .name, strong');
      if (nameEl) person.name = nameEl.textContent.trim();
      if (person.name || person.phones.length) people.push(person);
    });
  }

  return people;
}

async function doSearch() {
  const fname = document.getElementById('fname').value.trim();
  const lname = document.getElementById('lname').value.trim();
  const state = document.getElementById('state').value;

  if (!fname || !lname) {
    setStatus('Enter at least first and last name.', true);
    return;
  }

  const btn = document.getElementById('searchBtn');
  btn.disabled = true;
  setStatus('Searching public records...');
  document.getElementById('results').innerHTML = '';

  const res = await fetch(`${WORKER_URL}?name=${encodeURIComponent(fname + ' ' + lname)}&state=${encodeURIComponent(state)}`);
  const html = res.ok ? await res.text() : null;

  if (!html) {
    setStatus('Could not reach data source. CORS proxy may be down — try again in a moment.', true);
    btn.disabled = false;
    return;
  }

  const people = parseResults(html);
  btn.disabled = false;

  if (people.length === 0) {
    setStatus('');
    document.getElementById('results').innerHTML = '<div class="no-results">No results found. Try a different name or state.</div>';
    return;
  }

  setStatus(`${people.length} record${people.length !== 1 ? 's' : ''} found`);
  renderResults(people);
}

function renderResults(people) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  people.forEach(p => {
    const card = document.createElement('div');
    card.className = 'result-card';

    let html = `<h2>${p.name || 'Unknown'}${p.age ? ' &middot; Age ' + p.age : ''}</h2>`;

    if (p.phones.length > 0) {
      html += `<div class="result-section">
        <div class="section-label">Phone Numbers</div>
        <div class="items">${p.phones.map(ph => `<div class="item">${ph}</div>`).join('')}</div>
      </div>`;
    }

    if (p.addresses.length > 0) {
      html += `<div class="result-section">
        <div class="section-label">Addresses</div>
        <div class="items">${p.addresses.map(a => `<div class="item">${a}</div>`).join('')}</div>
      </div>`;
    }

    if (p.relatives.length > 0) {
      html += `<div class="result-section">
        <div class="section-label">Possible Relatives</div>
        <div class="items">${p.relatives.map(r => `<div class="item">${r}</div>`).join('')}</div>
      </div>`;
    }

    card.innerHTML = html;
    container.appendChild(card);
  });
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});
</script>
</body>
</html>
